services:
  tiktok-bot:
    build: .
    container_name: tiktok-auto-streak-bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ALLOWED_USER_ID=${ALLOWED_USER_ID}
      - TZ=${TZ:-Asia/Ho_Chi_Minh}
    # Playwright needs some shared memory
    shm_size: '2gb'
